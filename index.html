  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

px;\n    border-bottom: 2px solid var(--blue);\n    display: inline-block;\n  }\n\n  /* ── Workshop Hero ── */\n  .workshop-hero {\n    border-radius: 14px;\n    overflow: hidden;\n    position: relative;\n    min-height: 180px;\n    display: flex;\n    align-items: center;\n    background: var(--blue-dark);\n    color: white;\n    transition: filter 0.2s;\n  }\n  .workshop-hero:hover { filter: brightness(1.07); }\n\n  .workshop-bg {\n    position: absolute; inset: 0;\n    background-image: var(--celt-bg-url, url(\"e7c27750-467e-434b-b144-3dacca84a26b\"));\n    background-size: cover;\n    background-position: center right;\n    opacity: 0.22;\n  }\n\n  .workshop-overlay {\n    position: absolute; inset: 0;\n    background: linear-gradient(105deg, #1a1a2e 45%, transparent 100%);\n  }\n\n  .workshop-content {\n    position: relative;\n    z-index: 1;\n    padding: 28px 36px;\n    flex: 1;\n  }\n\n  .workshop-badge {\n    display: inline-flex;\n    align-items: center;\n    gap: 6px;\n    background: var(--coral);\n    color: white;\n    font-size: 11px;\n    font-weight: 700;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    padding: 4px 12px;\n    border-radius: 20px;\n    margin-bottom: 10px;\n  }\n\n  .workshop-title {\n    font-family: 'Inter', sans-serif;\n    font-size: 26px;\n    line-height: 1.15;\n    margin-bottom: 8px;\n    color: white;\n  }\n\n  .workshop-desc {\n    font-family: 'Inter', sans-serif;\n    font-size: 14px;\n    color: rgba(255,255,255,0.72);\n    margin-bottom: 18px;\n    max-width: 420px;\n    line-height: 1.55;\n  }\n\n  .workshop-btn {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    background: white;\n    color: var(--blue-dark);\n    font-family: 'DM Sans', sans-serif;\n    font-size: 14px;\n    font-weight: 700;\n    padding: 10px 22px;\n    border-radius: 8px;\n    text-decoration: none;\n    transition: background 0.15s, transform 0.15s;\n  }\n  .workshop-btn:hover { background: var(--blue-light); transform: translateY(-1px); }\n  .workshop-btn svg { width: 15px; height: 15px; }\n\n  .workshop-deco {\n    position: absolute;\n    right: 32px; top: 50%;\n    transform: translateY(-50%);\n    width: 120px; height: 120px;\n    border-radius: 50%;\n    border: 2px dashed rgba(255,255,255,0.15);\n    pointer-events: none;\n  }\n  .workshop-deco::after {\n    content: '';\n    position: absolute;\n    inset: 16px;\n    border-radius: 50%;\n    border: 2px dashed rgba(255,255,255,0.1);\n  }\n\n  /* ── Social row ── */\n  .social-row {\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    gap: 12px;\n    padding: 14px 0 4px;\n  }\n  .social-label {\n    font-size: 13px;\n    font-weight: 600;\n    color: var(--text-muted);\n    margin-right: 4px;\n    text-transform: uppercase;\n    letter-spacing: 0.06em;\n  }\n  .social-btn {\n    width: 40px; height: 40px;\n    border-radius: 50%;\n    display: flex; align-items: center; justify-content: center;\n    color: white;\n    text-decoration: none;\n    transition: transform 0.15s, opacity 0.15s;\n  }\n  .social-btn:hover { transform: translateY(-2px); opacity: 0.88; }\n  .social-btn svg { width: 18px; height: 18px; }\n  .social-btn.linkedin  { background: #0A66C2; }\n  .social-btn.instagram { background: radial-gradient(circle at 30% 110%, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }\n  .social-btn.x-twitter { background: #000; }\n  .social-btn.youtube   { background: #FF0000; }\n\n  /* ── Bottom row ── */\n  .bottom-row {\n    display: grid;\n    grid-template-columns: 1fr 2fr;\n    gap: 16px;\n    align-items: start;\n  }\n\n  /* ── Bulletin Card ── */\n  .bulletin-card {\n    border-radius: 14px;\n    overflow: hidden;\n    background: white;\n    box-shadow: 0 2px 12px rgba(58,74,200,0.08);\n    display: flex;\n    flex-direction: column;\n    text-decoration: none;\n    color: var(--text);\n    transition: box-shadow 0.2s, transform 0.2s;\n    border: 1.5px solid rgba(58,74,200,0.1);\n  }\n  .bulletin-card:hover {\n    box-shadow: 0 6px 24px rgba(58,74,200,0.16);\n    transform: translateY(-2px);\n  }\n\n  .bulletin-img-wrap {\n    width: 100%;\n    overflow: hidden;\n    background: var(--blue-dark);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    position: relative;\n  }\n\n  .bulletin-img-wrap img {\n    width: 100%;\n    height: auto;\n    display: block;\n  }\n\n  /* Fallback bulletin cover (shown if img fails) */\n  .bulletin-fallback {\n    width: 100%; height: 100%;\n    display: flex; flex-direction: column;\n    align-items: center; justify-content: center;\n    background: linear-gradient(135deg, #1a1a2e 0%, #3B4AC8 100%);\n    color: white;\n    text-align: center;\n    padding: 16px;\n    gap: 6px;\n  }\n  .bulletin-fallback .bf-uni { font-size: 10px; letter-spacing: 0.15em; opacity: 0.6; text-transform: uppercase; }\n  .bulletin-fallback .bf-title { font-family: 'DM Serif Display', serif; font-size: 28px; letter-spacing: -0.01em; }\n  .bulletin-fallback .bf-sub { font-size: 11px; letter-spacing: 0.1em; opacity: 0.7; text-transform: uppercase; }\n  .bulletin-fallback .bf-vol { font-size: 10px; opacity: 0.5; margin-top: 4px; }\n  .bulletin-fallback .bf-star {\n    color: var(--coral); font-size: 20px; line-height: 1;\n  }\n\n  .bulletin-footer {\n    padding: 12px 16px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    border-top: 1px solid #eef0f8;\n  }\n  .bulletin-footer-label {\n    font-size: 13px; font-weight: 700; color: var(--blue-dark);\n    text-transform: uppercase; letter-spacing: 0.06em;\n  }\n  .bulletin-footer-link {\n    font-size: 13px; color: var(--blue); font-weight: 600;\n    display: flex; align-items: center; gap: 4px;\n  }\n\n  /* ── LinkedIn Card ── */\n  .linkedin-card {\n    border-radius: 14px;\n    overflow: hidden;\n    background: white;\n    box-shadow: 0 2px 12px rgba(58,74,200,0.08);\n    display: flex;\n    flex-direction: column;\n    border: 1.5px solid rgba(58,74,200,0.1);\n  }\n\n  .linkedin-header {\n    background: var(--linkedin);\n    color: white;\n    padding: 12px 16px;\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    flex-shrink: 0;\n  }\n  .linkedin-logo {\n    width: 28px; height: 28px;\n    background: white;\n    border-radius: 4px;\n    display: flex; align-items: center; justify-content: center;\n    flex-shrink: 0;\n  }\n  .linkedin-logo svg { width: 18px; height: 18px; }\n  .linkedin-header-text { flex: 1; }\n  .linkedin-header-title { font-size: 14px; font-weight: 700; line-height: 1; }\n  .linkedin-header-sub { font-size: 11px; opacity: 0.8; margin-top: 2px; }\n\n  .linkedin-follow-btn {\n    display: inline-flex; align-items: center; gap: 6px;\n    background: white; color: var(--linkedin);\n    font-size: 12px; font-weight: 700;\n    padding: 5px 12px; border-radius: 20px;\n    text-decoration: none; flex-shrink: 0;\n    transition: background 0.15s;\n  }\n  .linkedin-follow-btn:hover { background: #e8f0fb; }\n\n  .curator-wrap {\n    flex: 1;\n    overflow-y: auto;\n    min-height: 300px;\n    max-height: 420px;\n    background: #f3f6f9;\n    padding: 12px;\n  }\n  .curator-wrap .crt-logo { display: none; }\n\n  @media (max-width: 600px) {\n    .bottom-row { grid-template-columns: 1fr; }\n    .workshop-content { padding: 20px; }\n    .workshop-title { font-size: 20px; }\n    .module { padding: 16px 12px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"module\">\n  <h2 class=\"module-title\">CELT News<\u002Fh2>\n\n  <!-- Workshop Hero -->\n  <div class=\"workshop-hero\" onclick=\"window.open('https://sites.google.com/mef.edu.tr/mef-innovative-instruction-hub/workshops','_blank')\" style=\"cursor:pointer;\">\n    <div class=\"workshop-bg\"><\u002Fdiv>\n    <div class=\"workshop-overlay\"><\u002Fdiv>\n    <div class=\"workshop-content\">\n      <div class=\"workshop-badge\">\n        <svg viewBox=\"0 0 16 16\" fil 02Fsvg>\n        <\u002Fdiv>\n        <div class=\"linkedin-header-text\">\n          <div class=\"linkedin-header-title\">MEF University CELT<\u002Fdiv>\n          <div class=\"linkedin-header-sub\">Latest posts from our LinkedIn page<\u002Fdiv>\n        <\u002Fdiv>\n        <a class=\"linkedin-follow-btn\" href=\"https://www.linkedin.com/company/mef-celt?originalSubdomain=tr\" target=\"_blank\" rel=\"noopener\">\n          + Follow\n        <\u002Fa>\n      <\u002Fdiv>\n      <div class=\"curator-wrap\">\n        <div id=\"curator-feed-default-feed-layout\"><a href=\"https://curator.io\" target=\"_blank\" class=\"crt-logo crt-tag\">Powered by Curator.io<\u002Fa><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Tweaks -->\n<div id=\"tweaks-panel\" style=\"display:none; position:fixed; bottom:20px; right:20px; background:white; border:2px solid #1a1a2e; border-radius:10px; padding:16px; width:230px; z-index:9999; font-family:'DM Sans',sans-serif; box-shadow: 0 4px 20px rgba(0,0,0,0.15);\">\n  <div style=\"font-size:15px; font-weight:700; margin-bottom:14px; color:#1a1a2e;\">Tweaks<\u002Fdiv>\n\n  <label style=\"font-size:13px; display:block; margin-bottom:10px; color:#444;\">\n    Workshop accent color\n    <select id=\"tw-accent\" style=\"width:100%; margin-top:4px; font-family:'DM Sans',sans-serif; font-size:13px; border:1.5px solid #ddd; border-radius:6px; padding:5px;\">\n      <option value=\"#1a1a2e\">Navy (default)<\u002Foption>\n      <option value=\"#3B4AC8\">CELT Blue<\u002Foption>\n      <option value=\"#E84855\">Coral Red<\u002Foption>\n    <\u002Fselect>\n  <\u002Flabel>\n\n  <label style=\"font-size:13px; display:block; margin-bottom:10px; color:#444;\">\n    Workshop description\n    <textarea id=\"tw-desc\" rows=\"3\" style=\"width:100%; margin-top:4px; font-family:'DM Sans',sans-serif; font-size:12px; border:1.5px solid #ddd; border-radius:6px; padding:6px; resize:none;\">Explore professional development workshops for MEF University instructors. Browse sessions, register and grow your teaching practice.<\u002Ftextarea>\n  <\u002Flabel>\n\n  <button onclick=\"applyTweaks()\" style=\"width:100%; background:#3B4AC8; color:white; border:none; border-radius:6px; padding:8px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer;\">Apply<\u002Fbutton>\n<\u002Fdiv>\n\n<script>\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\"accent\":\"#1a1a2e\",\"desc\":\"Explore professional development workshops for MEF University instructors. Browse sessions, register and grow your teaching practice.\"}/*EDITMODE-END*/;\n\n  window.addEventListener('message', e => {\n    if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').style.display = 'block';\n    if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';\n  });\n  window.parent.postMessage({type: '__edit_mode_available'}, '*');\n\n  function applyTweaks() {\n    const accent = document.getElementById('tw-accent').value;\n    const desc = document.getElementById('tw-desc').value;\n    document.querySelector('.workshop-hero').style.setProperty('--hero-accent', accent);\n    document.querySelector('.workshop-overlay').style.background = `linear-gradient(105deg, ${accent} 45%, transparent 100%)`;\n    document.querySelector('.workshop-desc').textContent = desc;\n    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{accent, desc}}, '*');\n  }\n\n  // Apply saved defaults on load\n  document.querySelector('.workshop-overlay').style.background = `linear-gradient(105deg, ${TWEAK_DEFAULTS.accent} 45%, transparent 100%)`;\n  document.querySelector('.workshop-desc').textContent = TWEAK_DEFAULTS.desc;\n\n  // Apply inlined background image if available\n  if (window.__resources && window.__resources.celtBg) {\n    document.documentElement.style.setProperty('--celt-bg-url', `url('${window.__resources.celtBg}')`);\n  }\n<\u002Fscript>\n\n\n\n<!-- Curator.io LinkedIn Feed -->\n<script type=\"text/javascript\">\n(function(){\nvar i,e,d=document,s=\"script\";i=d.createElement(\"script\");i.async=1;i.charset=\"UTF-8\";\ni.src=\"https://cdn.curator.io/published/579820dc-fc14-4684-b98a-b6eadae1a234.js\";\ne=d.getElementsByTagName(s)[0];e.parentNode.insertBefore(i, e);\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
